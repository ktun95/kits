schemaVersion: "1"
kind: mixin
name: vertex-ai
displayName: Vertex AI Configuration
description: Environment variables for Google Vertex AI integration with Claude Code

environment:
  variables:
    GOOGLE_APPLICATION_CREDENTIALS: /home/agent/.credentials/vertex-ai-user.json
    CLAUDE_CODE_USE_VERTEX: "1"
    CLOUD_ML_REGION: us-east5

agentContext: |
  Vertex AI is configured with credentials at $GOOGLE_APPLICATION_CREDENTIALS.
  Region: $CLOUD_ML_REGION
